<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">

</head>
<body>

<header>
  <div class="header-left">
    <h1>Device info</h1>

  </div>
  <div class="header-right">

            6.53 5.47 7.59.4.07.55-.17.55-.38 
            0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94
            -.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52
            -.01-.53.63-.01 1.08.58 1.23.82.72 1.21 
            1.87.87 2.33.66.07-.52.28-.87.51-1.07
            -1.78-.2-3.64-.89-3.64-3.95 
            0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 
            0 0 .67-.21 2.2.82a7.5 7.5 0 0 1 2-.27c.68 
            0 1.36.09 2 .27 1.53-1.04 2.2-.82

            <span id="theme-icon">○</span>

        </button>
    </div>
</header>

<div id="loader">
  <div class="loader-item"><span class="loader-key">navigator</span><div class="loader-bar-wrap"><div class="loader-bar-fill"></div></div></div>
  <div class="loader-item"><span class="loader-key">storage / cookies</span><div class="loader-bar-wrap"><div class="loader-bar-fill"></div></div></div>
  <div class="loader-item"><span class="loader-key">webgl / canvas</span><div class="loader-bar-wrap"><div class="loader-bar-fill"></div></div></div>
  <div class="loader-item"><span class="loader-key">audio</span><div class="loader-bar-wrap"><div class="loader-bar-fill"></div></div></div>
  <div class="loader-item"><span class="loader-key">network / webrtc</span><div class="loader-bar-wrap"><div class="loader-bar-fill"></div></div></div>
</div>

<div id="output">
  <div id="net-hero"></div>
  <div class="sections-grid" id="grid"></div>
</div>

<footer id="footer"></footer>


<script src="/static/script.js"></script>
</body>
</html>
